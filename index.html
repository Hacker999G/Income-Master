<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Mini App</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
    color: #fff;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .btn {
    display: block;
    width: 100%;
    margin: 15px 0;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    color: white;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(255,0,204,0.5);
  }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,51,255,0.7);
  }
  .task {
    margin: 10px 0;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>

<div class="container">
  <h1>Activate Your Account</h1>

  <a class="btn" href="https://payflow-git.vercel.app/?pay=PC2KRErv0Uw3VoV63f6R?amount=20&cus_id=USER_1">

  </div>
</div>

</body>
</html>
